<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>制作ランクシステム 完全版</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body { font-family: Arial; text-align: center; background: #fff; }
.container { margin-top: 20px; }
button { padding: 8px 18px; font-size: 16px; margin: 5px; }

#timer {
    font-family: 'Orbitron';
    font-size: 50px;
    color: #0d6efd;
    -webkit-text-stroke: 0.6px #004080;
}

#rank { font-family: 'Bangers'; font-size: 36px; }

#totalHours {
    font-size: 34px;
    color: #333;
    -webkit-text-stroke: 0.5px #666;
}

.progress { width: 80%; height: 25px; background: #ddd; margin: 15px auto; border-radius: 20px; }
.progress-bar {
  height: 100%;
  width: 0%;
  border-radius: 20px;
  transition: width 0.5s ease, background 0.5s ease;

  /* ★ 内側発光 */
  box-shadow: inset 0 0 10px rgba(255,255,255,0.6);
}

#calendar {
    display: grid;
    grid-template-columns: repeat(7, 40px);
    grid-gap: 5px;
    justify-content: center;
    margin-top: 20px;
}
.day {
    width: 40px; height: 40px;
    line-height: 40px;
    border-radius: 5px;
    background: #fff;
    border: 1px solid #000;
    cursor: pointer;
}
.day.active { background: #28a745; color: #fff; }
    .ranking-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 30px;
  flex-wrap: wrap;
}

.ranking-box {
  width: 300px;
  background: #f8f9fa;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.ranking-box h2 {
  margin-top: 0;
}
.button-row{
  position: relative;
  margin: 40px 0;
  height: 100px; /* 高さを確保する */
}
.danger{
  background:#dc3545;
  color:white;
  border:none;
}
.button-area{
  position: relative;
  margin: 40px 0;
  height: 120px;
}

/* 真ん中 */
.center-buttons{
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

/* 右中央 */
.right-buttons{
  position: absolute;
  right: 5%;
  top: 60%;
  transform: translateY(-50%);
  display: flex;
  gap: 10px;
}

/* 右上 */
.test-button{
  position: absolute;
  right: 5%;
  top: 0;
  background: #6c757d;
  color: white;
  border: none;
}

.danger{
  background:#dc3545;
  color:white;
  border:none;
}
.progress-wrapper{
  width:80%;
  margin:30px auto;
  position:relative;
}

/* 光レイヤー */
.progress-glow{
  position:absolute;
  height:25px;
  width:0%;
  border-radius:20px;
  top:0;
  left:0;
  filter:blur(15px);
  opacity:0.7;
  transition:width 0.5s ease, background 0.5s ease;
}

/* 本体 */
.progress{
  height:25px;
  background:#ddd;
  border-radius:20px;
  position:relative;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  border-radius:20px;
  transition:width 0.5s ease, background 0.5s ease;
}

.progress-text{
  position:absolute;
  width:100%;
  text-align:center;
  top:0;
  line-height:25px;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<h1>制作ランクシステム</h1>

<div style="margin:20px;">
  <h3>アカウント</h3>
  <input id="email" type="email" placeholder="メールアドレス">
  <input id="password" type="password" placeholder="パスワード">
  <button onclick="signUp()">登録</button>
  <button onclick="signIn()">ログイン</button>
  <button onclick="signOut()">ログアウト</button>
  <p id="authMessage"></p>
  <p id="currentUser"></p>
　<h3>ユーザーネーム変更</h3>
　<input id="newNickname" type="text" placeholder="新しいユーザーネーム">
　<button onclick="updateNickname()">変更する</button>
　<p id="nicknameMessage"></p>
</div>

<p>累計時間: <span id="totalHours">0</span> h</p>
<p>現在のランク: <span id="rank">ブロンズ I</span></p>
<p>次のランクまで: <span id="nextRank">4</span> h</p>

<div id="timer">00:00:00</div>

<div class="button-area">

  <div class="center-buttons">
    <button onclick="addTime()">+30分</button>
    <button onclick="startTimer()">スタート/一時停止</button>
  </div>

  <div class="right-buttons">
    <button class="danger" onclick="confirmResetTimer()">タイマーリセット</button>
    <button class="danger" onclick="confirmResetData()">累計リセット</button>
  </div>

  <button class="test-button" onclick="addTestHours()">+10時間（テスト）</button>

</div>

</div>

<div class="progress-wrapper">
  <div class="progress-glow" id="progressGlow"></div>
  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
    <div class="progress-text" id="progressText">0%</div>
  </div>
</div>

<div>
<button onclick="changeMonth(-1)">◀ 前月</button>
<span id="monthLabel">2026年3月</span>
<button onclick="changeMonth(1)">次月 ▶</button>
</div>

<div id="monthTotal">今月合計: 0 h</div>
<div id="calendar"></div>

<div class="ranking-container">

  <div class="ranking-box">
    <h2>総合ランキング</h2>
    <div id="totalRank"></div>
  </div>

  <div class="ranking-box">
    <h2>今月のランキング</h2>
    <div id="monthRank"></div>
  </div>

  <div class="ranking-box">
    <h2>今週のランキング</h2>
    <div id="weekRank"></div>
  </div>

</div>  <!-- ← container閉じ -->

</div>
<!-- ----------------------- -->
<!-- タイマー & ランク計算 -->
<!-- ----------------------- -->
<script>
const ranks = [
{ name:"ブロンズ I", hours:0, color:"#ff9900", stroke:"#cc6600" },
{ name:"ブロンズ II", hours:4, color:"#ff9900", stroke:"#cc6600" },
{ name:"ブロンズ III", hours:11, color:"#ff9900", stroke:"#cc6600" },
{ name:"シルバー I", hours:20, color:"#c0c0c0", stroke:"#808080" },
{ name:"シルバー II", hours:29, color:"#c0c0c0", stroke:"#808080" },
{ name:"シルバー III", hours:43, color:"#c0c0c0", stroke:"#808080" },
{ name:"ゴールド I", hours:60, color:"#ffd700", stroke:"#ccaa00" },
{ name:"ゴールド II", hours:78, color:"#ffd700", stroke:"#ccaa00" },
{ name:"ゴールド III", hours:104, color:"#ffd700", stroke:"#ccaa00" },
{ name:"プラチナ I", hours:140, color:"#d0e0e3", stroke:"#9fb8bd" },
{ name:"プラチナ II", hours:178, color:"#d0e0e3", stroke:"#9fb8bd" },
{ name:"プラチナ III", hours:232, color:"#d0e0e3", stroke:"#9fb8bd" },
{ name:"ダイヤモンド I", hours:300, color:"#00ffff", stroke:"#009999" },
{ name:"ダイヤモンド II", hours:372, color:"#00ffff", stroke:"#009999" },
{ name:"ダイヤモンド III", hours:476, color:"#00ffff", stroke:"#009999" },
{ name:"カーボナド", hours:620, color:"#8b0000", stroke:"#550000" },
{ name:"パラゴン", hours:1260, color:"#4b0082", stroke:"#2e004d" },
{ name:"オムニス", hours:2540, color:"#00ff99", stroke:"#009966" }
];

let totalHours = 0;
let timerInterval = null;
let remainingSeconds = 0;

function addTime(){ remainingSeconds += 1800; updateTimerDisplay(); }
function startTimer(){
    if(timerInterval){ clearInterval(timerInterval); timerInterval=null; return; }
    if(remainingSeconds<=0) return;
    timerInterval = setInterval(() => {
        remainingSeconds--;
        updateTimerDisplay();
        if(remainingSeconds<=0){
            clearInterval(timerInterval); timerInterval=null;
            totalHours+=0.5;
            updateDisplay();
        }
    },1000);
}
function resetTimer(){ clearInterval(timerInterval); timerInterval=null; remainingSeconds=0; updateTimerDisplay(); }
function updateTimerDisplay(){
    const h=String(Math.floor(remainingSeconds/3600)).padStart(2,"0");
    const m=String(Math.floor((remainingSeconds%3600)/60)).padStart(2,"0");
    const s=String(remainingSeconds%60).padStart(2,"0");
    document.getElementById("timer").innerText=`${h}:${m}:${s}`;
}
function addTestHours(){ totalHours+=10; updateDisplay(); }
function resetData(){ totalHours=0; updateDisplay(); }
function confirmResetTimer(){
  if(confirm("本当にタイマーをリセットしますか？")){
    resetTimer();
  }
}

function confirmResetData(){
  if(confirm("累計時間を完全にリセットしますか？この操作は戻せません。")){
    resetData();
  }
}
function updateDisplay(){
    console.log("updateDisplay動いた", totalHours);
    document.getElementById("totalHours").innerText = totalHours.toFixed(1);

    let currentRank = ranks[0];
    let nextRank = null;

    for(let i=0;i<ranks.length;i++){
        if(totalHours >= ranks[i].hours){
            currentRank = ranks[i];
            nextRank = ranks[i+1];
        }
    }

    const rankEl = document.getElementById("rank");
    rankEl.innerText = currentRank.name;
    rankEl.style.color = currentRank.color;
    rankEl.style.webkitTextStroke = "0.6px " + currentRank.stroke;

    if(nextRank){
        const remaining = nextRank.hours - totalHours;
        document.getElementById("nextRank").innerText = remaining.toFixed(1);

const range = nextRank.hours - currentRank.hours;
const progress = totalHours - currentRank.hours;
const percent = (progress / range) * 100;

const bar = document.getElementById("progressBar");
bar.style.width = percent + "%";

/* ランク色に変更 */
bar.style.background = currentRank.color;
bar.style.color = currentRank.color;
bar.classList.add("glow");
bar.style.boxShadow =
  "0 0 8px " + currentRank.color + ", inset 0 0 10px rgba(255,255,255,0.6)";
bar.style.color = currentRank.color; // ← 追加（これ重要）

/* %表示 */
document.getElementById("progressText").innerText =
  percent.toFixed(1) + "%";

    }else{
        document.getElementById("nextRank").innerText = "達成済み";
        document.getElementById("progressBar").style.width = "100%";
    }
}

// カレンダー
let currentDate = new Date();
function changeMonth(offset){ currentDate.setMonth(currentDate.getMonth()+offset); renderCalendar(); }
function renderCalendar(){
    const year=currentDate.getFullYear(), month=currentDate.getMonth();
    document.getElementById("monthLabel").innerText=`${year}年${month+1}月`;
    const calendar=document.getElementById("calendar"); calendar.innerHTML="";
    const firstDay=new Date(year,month,1).getDay();
    const daysInMonth=new Date(year,month+1,0).getDate();
    for(let i=0;i<firstDay;i++){ calendar.innerHTML+="<div></div>"; }
    for(let d=1;d<=daysInMonth;d++){
        const day=document.createElement("div");
        day.className="day"; day.innerText=d; calendar.appendChild(day);
    }
}
updateTimerDisplay(); updateDisplay(); renderCalendar();
</script>

<script>
const supabaseUrl = "https://vfgfunxzthogghymrnnq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmZ2Z1bnh6dGhvZ2doeW1ybm5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQzMDQsImV4cCI6MjA4Nzg5MDMwNH0.HA0wze4yqkq1XebULhpyDUqQkgRe4xIoHUBTB65bM-o";

// ← 重複宣言回避: const supabaseClient に変更
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
async function signUp(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  document.getElementById("authMessage").innerText =
    error ? error.message : "登録成功！メール確認してください";
}

async function signIn(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    document.getElementById("authMessage").innerText = error.message;
  } else {
    document.getElementById("authMessage").innerText = "ログイン成功";
    showCurrentUser();
  }
}

async function signOut(){
  await supabaseClient.auth.signOut();
  document.getElementById("authMessage").innerText = "ログアウトしました";
  document.getElementById("currentUser").innerText = "";
}
async function showCurrentUser() {
  const { data: { user } } = await supabaseClient.auth.getUser();

  if (user) {
    const nickname = user.user_metadata?.nickname;

    document.getElementById("currentUser").innerText =
      "ログイン中: " + (nickname || user.email);
  }
}
    async function updateNickname() {
  const newNickname = document.getElementById("newNickname").value;

  if (!newNickname) {
    document.getElementById("nicknameMessage").innerText = "名前を入力してください";
    return;
  }

  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) {
    document.getElementById("nicknameMessage").innerText = "ログインしてください";
    return;
  }

  const { error } = await supabaseClient.auth.updateUser({
    data: { nickname: newNickname }
  });

  if (error) {
    document.getElementById("nicknameMessage").innerText = error.message;
  } else {
    document.getElementById("nicknameMessage").innerText = "変更成功！";
    showCurrentUser();
  }
}
console.log("Supabase接続成功:", supabaseClient);

let liveTotalSeconds=0, liveWeeklySeconds=0, liveMonthlySeconds=0, liveCounter=0;
const userName="testuser";

async function tickTimer(){

    const { data: { user } } = await supabaseClient.auth.getUser();
    if(!user) return; // ログインしてないなら保存しない

    liveTotalSeconds++;
    liveWeeklySeconds++;
    liveMonthlySeconds++;
    liveCounter++;

    if(liveCounter>=60){
        liveCounter=0;

        let record={
            user_id:user.id,
            username:user.email,
            total_minutes:Math.floor(liveTotalSeconds/60),
            weekly_minutes:Math.floor(liveWeeklySeconds/60),
            monthly_minutes:Math.floor(liveMonthlySeconds/60)
        };

        await supabaseClient
            .from("record")
            .upsert(record,{ onConflict:"user_id" });

        updateRanking();
    }
}
function startLiveTimer(){ setInterval(tickTimer,1000); }
function resetIfNeeded(record){
    const now=new Date();
    const monday=new Date(now); monday.setDate(now.getDate()-now.getDay()+1); monday.setHours(0,0,0,0);
    const lastWeek=new Date(record.created_at); lastWeek.setHours(0,0,0,0);
    if(lastWeek<monday) record.weekly_minutes=0;
    const currentMonth=now.getMonth();
    const lastMonth=new Date(record.created_at).getMonth();
    if(currentMonth!==lastMonth) record.monthly_minutes=0;
    return record;
}
async function updateRanking(){
    const totalRank=await fetchRanking("total_minutes");
    const weekRank=await fetchRanking("weekly_minutes");
    const monthRank=await fetchRanking("monthly_minutes");
    renderRanking("totalRank",totalRank,"total_minutes");
    renderRanking("weekRank",weekRank,"weekly_minutes");
    renderRanking("monthRank",monthRank,"monthly_minutes");
}
async function fetchRanking(column){
    const { data } = await supabaseClient.from("record").select("*").order(column,{ascending:false}).limit(100);
    return data||[];
}
function renderRanking(elementId,data,column){
    const div=document.getElementById(elementId);
    div.innerHTML="";
    data.forEach((user,index)=>{
        let medal="";
        if(index===0) medal="🥇 "; else if(index===1) medal="🥈 "; else if(index===2) medal="🥉 ";
        div.innerHTML+=`<p>${medal}${index+1}位 ${user.username} - ${user[column]}分</p>`;
    });
}

startLiveTimer();
</script>
</body>
</html>
