<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study Arena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body { font-family: Arial; text-align: center; background: #fff; margin: 0; padding: 0; }
.container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 20px; box-sizing: border-box; position: relative; }
button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: #f8f9fa; }

#timer { 
    font-family: 'Orbitron'; 
    font-size: 45px; 
    color: #0d6efd; 
    -webkit-text-stroke: 0.6px #004080; 
    margin: 10px 0;
}

#totalHours { font-size: 32px; color: #333; font-weight: bold; }
#rank { font-family: 'Bangers'; font-size: 36px; }

.progress-wrapper { width: 90%; margin: 20px auto; position: relative; }
.progress { height: 25px; background: #ddd; border-radius: 20px; position: relative; overflow: hidden; }
.progress-bar { height: 100%; width: 0%; border-radius: 20px; transition: width 0.5s ease; background: #0d6efd; }
.progress-text { position: absolute; width: 100%; text-align: center; top: 0; line-height: 25px; font-weight: bold; color: #000; }

#calendar { display: grid; grid-template-columns: repeat(7, 1fr); grid-gap: 5px; max-width: 350px; margin: 20px auto; }
.day { aspect-ratio: 1/1; line-height: 40px; border-radius: 5px; background: #ebedf0; border: 1px solid #eee; font-size: 12px; }

.ranking-section { margin-top: 40px; }
.ranking-toggle {
    width: 100%; max-width: 330px; background: #f8f9fa; border: 1px solid #ddd;
    padding: 15px; margin: 10px auto; border-radius: 10px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center; font-weight: bold;
}
.ranking-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; width: 100%; max-width: 330px; margin: 0 auto; }
.ranking-content.open { max-height: 400px; overflow-y: auto; border: 1px solid #ddd; background: #fff; }
.arrow { transition: transform 0.3s; }
.open .arrow { transform: rotate(180deg); }

.danger { background: #dc3545; color: white; border: none; }
</style>
</head>

<body>
<div class="container">
    <h1>Study Arena</h1>

    <div id="streakDisplay" style="font-size: 24px; font-weight: bold; color: #ff4500; margin: 10px 0; font-family: 'Orbitron', sans-serif;">🌵 準備完了</div>

    <div style="position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 5px;">
        <button class="danger" onclick="confirmResetTimer()" style="font-size: 10px; padding: 5px;">リセット</button>
    </div>

    <button onclick="addTestHours()" style="position: absolute; top: 20px; left: 20px; background: #6c757d; color: white; border: none; font-size: 10px; padding: 5px; border-radius: 5px;">+10h (TEST)</button>

    <div style="background:#f1f3f5; padding:15px; border-radius:10px; margin: 20px auto; max-width: 500px;">
        <h3>Account</h3>
        <input id="email" type="email" placeholder="Email" style="padding:5px;">
        <input id="password" type="password" placeholder="Pass" style="padding:5px;">
        <div style="margin-top:10px;">
            <button onclick="signUp()">登録</button>
            <button onclick="signIn()">ログイン</button>
            <button onclick="signOut()">ログアウト</button>
        </div>
        <p id="currentUser" style="font-weight:bold; font-size: 12px;"></p>
    </div>

    <p>累計時間: <span id="totalHours">0</span> h</p>
    <p id="totalHoursDetail" style="margin-top:-15px; margin-bottom:15px; color:#666; font-size:14px;"></p>
    
    <p>Rank: <span id="rank">ブロンズ I</span></p>
    <p style="font-size: 13px;">Next: <span id="nextRank">0</span> h</p>

    <div id="timer">00:00:00</div>

    <div>
        <button onclick="addTime()">+30分</button>
        <button onclick="startTimer()" style="padding: 10px 20px; font-weight: bold; background: #0d6efd; color:white;">START / PAUSE</button>
    </div>

    <div class="progress-wrapper">
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
    </div>

    <div style="margin-top:40px;">
        <button onclick="changeMonth(-1)">◀</button>
        <span id="monthLabel" style="font-weight:bold; font-size:18px; margin:0 10px;">2026年3月</span>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div id="monthTotal" style="font-size: 14px; margin: 5px;">今月合計: 0 h</div>
    <div id="calendar"></div>

    <div class="ranking-section">
        <h2>🏆 Ranking</h2>
        <div class="ranking-toggle" onclick="toggleRank('totalContent')">総合ランキング <span class="arrow">▼</span></div>
        <div id="totalContent" class="ranking-content"><div id="totalRank"></div><p id="myRankTotal"></p></div>
        
        <div class="ranking-toggle" onclick="toggleRank('dailyContent')">今日のランキング <span class="arrow">▼</span></div>
        <div id="dailyContent" class="ranking-content"><div id="dailyRank"></div><p id="myRankDaily"></p></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const ranks = [
    { name:"ブロンズ I", hours:0, color:"#ff9900", stroke:"#cc6600" },
    { name:"ブロンズ II", hours:4, color:"#ff9900", stroke:"#cc6600" },
    { name:"シルバー I", hours:20, color:"#c0c0c0", stroke:"#808080" },
    { name:"ゴールド I", hours:60, color:"#ffd700", stroke:"#ccaa00" },
    { name:"ダイヤモンド I", hours:300, color:"#00ffff", stroke:"#009999" }
];

let totalHours = 0;
let timerInterval = null;
let remainingSeconds = 0;
let currentDate = new Date();

const supabaseUrl = "https://vfgfunxzthogghymrnnq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmZ2Z1bnh6dGhvZ2doeW1ybm5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQzMDQsImV4cCI6MjA4Nzg5MDMwNH0.HA0wze4yqkq1XebULhpyDUqQkgRe4xIoHUBTB65bM-o";
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

function addTime(){ remainingSeconds += 1800; updateTimerDisplay(); }
function startTimer(){
    if(timerInterval){ clearInterval(timerInterval); timerInterval=null; return; }
    if(remainingSeconds<=0) return;
    timerInterval = setInterval(() => {
        remainingSeconds--;
        updateTimerDisplay();
        if(remainingSeconds<=0){
            clearInterval(timerInterval); timerInterval=null;
            totalHours += 0.5;
            saveToSupabase(); 
            updateDisplay();
        }
    },1000);
}
function updateTimerDisplay(){
    const h=String(Math.floor(remainingSeconds/3600)).padStart(2,"0");
    const m=String(Math.floor((remainingSeconds%3600)/60)).padStart(2,"0");
    const s=String(remainingSeconds%60).padStart(2,"0");
    document.getElementById("timer").innerText=`${h}:${m}:${s}`;
}

function updateDisplay() {
    const streakText = document.getElementById("streakDisplay").innerText;
    const streakNum = parseInt(streakText.replace(/[^0-9]/g, "")) || 0;
    const multiplier = getBonusMultiplier(streakNum);
    
    const totalWithBonus = totalHours; 
    const rawHours = totalWithBonus / multiplier;
    const bonusHours = totalWithBonus - rawHours;

    document.getElementById("totalHours").innerText = totalWithBonus.toFixed(1);
    document.getElementById("totalHoursDetail").innerText = `(実質: ${rawHours.toFixed(1)}h + 🎁: ${bonusHours.toFixed(1)}h)`;

    let currentRank = ranks[0], nextRank = null;
    for(let i=0; i<ranks.length-1; i++){
        if(totalWithBonus >= ranks[i].hours && totalWithBonus < ranks[i+1].hours){
            currentRank = ranks[i]; nextRank = ranks[i+1]; break;
        }
    }
    const rankEl = document.getElementById("rank");
    rankEl.innerText = currentRank.name; rankEl.style.color = currentRank.color;

    const bar = document.getElementById("progressBar");
    if(nextRank){
        document.getElementById("nextRank").innerText = (nextRank.hours - totalWithBonus).toFixed(1);
        let percent = ((totalWithBonus - currentRank.hours) / (nextRank.hours - currentRank.hours)) * 100;
        bar.style.width = percent + "%";
        document.getElementById("progressText").innerText = Math.floor(percent) + "%";
    }
}

async function signUp(){
    const email=document.getElementById("email").value, password=document.getElementById("password").value;
    const { error } = await supabaseClient.auth.signUp({ email, password });
    alert(error ? error.message : "確認メールを送りました");
}
async function signIn(){
    const email = document.getElementById("email").value, password = document.getElementById("password").value;
    const { data: { user }, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if(error) alert(error.message); else init();
}
async function signOut(){ await supabaseClient.auth.signOut(); location.reload(); }

async function saveToSupabase() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return;
    const todayStr = new Date().toLocaleDateString('sv-SE');
    const { data: currentLog } = await supabaseClient.from("daily_logs").select("minutes").eq("user_id", user.id).eq("work_date", todayStr).maybeSingle();
    await supabaseClient.from("daily_logs").upsert({ user_id: user.id, work_date: todayStr, minutes: (currentLog?.minutes || 0) + 30 }, { onConflict: "user_id,work_date" });
    await supabaseClient.from("record").upsert({ user_id: user.id, total_minutes: Math.round(totalHours * 60), updated_at: new Date().toISOString() }, { onConflict: "user_id" });
    updateRanking(); renderCalendar();
}

async function updateRanking(){
    const types = [{ col: "total_minutes", id: "totalRank" }, { col: "daily_minutes", id: "dailyRank" }];
    for(let t of types) {
        const { data } = await supabaseClient.from("record").select("*").order(t.col, {ascending:false}).limit(10);
        const div = document.getElementById(t.id); div.innerHTML = "";
        data?.forEach((r, i) => {
            const mult = getBonusMultiplier(r.streak_days || 0);
            const totalM = r[t.col] || 0;
            const rawM = Math.round(totalM / mult);
            div.innerHTML += `<div style="font-size:12px; padding:5px; border-bottom:1px solid #eee; text-align:left;">
                ${i+1}位: ${r.username || 'User'}<br><b>${(totalM/60).toFixed(1)}h</b> <small>(実:${(rawM/60).toFixed(1)}h + 🎁)</small></div>`;
        });
    }
}

async function renderCalendar() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return;
    const year = currentDate.getFullYear(), month = currentDate.getMonth();
    document.getElementById("monthLabel").innerText = `${year}年${month + 1}月`;
    const { data: logs } = await supabaseClient.from("daily_logs").select("*").eq("user_id", user.id);
    
    // ストリーク計算
    let streakCount = 0;
    let tempDate = new Date();
    const activeDays = new Set(logs?.filter(l => l.minutes > 0).map(l => l.work_date));
    while (true) {
        const dStr = tempDate.toLocaleDateString('sv-SE');
        if (activeDays.has(dStr)) { streakCount++; tempDate.setDate(tempDate.getDate() - 1); }
        else if (streakCount === 0 && dStr === new Date().toLocaleDateString('sv-SE')) { tempDate.setDate(tempDate.getDate() - 1); }
        else break;
    }
    document.getElementById("streakDisplay").innerText = streakCount > 0 ? `🔥 ${streakCount}日連続中！` : `🌵 記録を始めよう`;
    updateDisplay();

    // カレンダー描画
    const calendar = document.getElementById("calendar"); calendar.innerHTML = "";
    const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
    for (let i = 0; i < firstDay; i++) calendar.appendChild(document.createElement("div"));
    for (let d = 1; d <= daysInMonth; d++) {
        const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const log = logs?.find(l => l.work_date === dStr);
        const el = document.createElement("div"); el.className = "day"; el.innerText = d;
        if (log?.minutes > 0) el.style.background = "#40c463";
        calendar.appendChild(el);
    }
}

function getBonusMultiplier(s) { return s >= 14 ? 1.2 : s >= 7 ? 1.1 : s >= 3 ? 1.05 : 1.0; }
function changeMonth(o){ currentDate.setMonth(currentDate.getMonth()+o); renderCalendar(); }
function toggleRank(id){ document.getElementById(id).classList.toggle('open'); }
function confirmResetTimer(){ if(confirm("リセット？")){ remainingSeconds=0; updateTimerDisplay(); } }

async function init() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (user) {
        document.getElementById("currentUser").innerText = `Login: ${user.email}`;
        const { data } = await supabaseClient.from("record").select("*").eq("user_id", user.id).maybeSingle();
        totalHours = (data?.total_minutes || 0) / 60;
        renderCalendar(); updateRanking();
    } else { updateDisplay(); }
}
init();
</script>
</body>
</html>
