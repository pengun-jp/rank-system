<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Stuvy - 18段階のランクで楽しむ学習アリーナ</title>
    
    <meta name="description" content="Stuvy（スタヴィ）は、学習記録をつけてランクを上げる、新感覚のスタディ・アリーナです。18段階のランクとストリーク機能で、あなたの勉強を習慣化します。">
    
    <meta property="og:title" content="Stuvy">
    <meta property="og:description" content="ランクアップと立ち絵演出で、最高の学習体験を。">
    <meta property="og:url" content="あなたのGitHub PagesのURL">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: Arial, sans-serif;

    /* ★ ここにお気に入りの画像URLを貼り付け ★ */
    background-image: url('background-color: #f0f2f5;'); 

    background-size: cover;          /* 画面いっぱいに広げる */
    background-position: center;     /* 中央合わせ */
    background-attachment: fixed;    /* スクロールしても背景を動かさない */
    background-repeat: no-repeat;    /* 繰り返さない */
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
    
    /* 背景画像の上で文字を読みやすくする半透明の板（0.8は透明度） */
    background: rgba(255, 255, 255, 0.8); 
    min-height: 100vh;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
}
button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: #f8f9fa; }

/* ステータス周り */
#timer { font-family: 'Orbitron'; font-size: 45px; color: #0d6efd; -webkit-text-stroke: 0.6px #004080; margin: 10px 0; }
#totalHours { font-size: 32px; color: #333; font-weight: bold; }
#rank { font-family: 'Bangers'; font-size: 40px; }

/* ゲージ */
.progress-wrapper { width: 90%; margin: 30px auto; position: relative; }
.progress { height: 25px; background: #ddd; border-radius: 20px; position: relative; overflow: hidden; }
.progress-bar { height: 100%; width: 0%; border-radius: 20px; transition: width 0.5s ease; box-shadow: inset 0 0 10px rgba(255,255,255,0.6); }
.progress-text { position: absolute; width: 100%; text-align: center; top: 0; line-height: 25px; font-weight: bold; }

/* カレンダー */
#calendar { display: grid; grid-template-columns: repeat(7, 1fr); grid-gap: 5px; max-width: 350px; margin: 20px auto; }
.day { aspect-ratio: 1/1; line-height: 40px; border-radius: 5px; background: #ebedf0; border: 1px solid #eee; font-size: 12px; }

/* ★ お知らせ欄のスタイル ★ */
.news-section {
    max-width: 500px;
    margin: 30px auto;
    text-align: left;
    background: #fff8e1;
    border-left: 5px solid #ffc107;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    overflow: hidden; /* 角丸からはみ出さないよう */
}
.news-title { 
    font-weight: bold; 
    padding: 10px 15px;
    background: #ffecb3;
    font-size: 16px;
}
#newsContent {
    max-height: 200px; /* ここで高さを制限 */
    overflow-y: auto;  /* 長すぎたらスクロール */
    padding: 0 15px;
}
.news-item { 
    font-size: 14px; 
    padding: 12px 0;
    border-bottom: 1px solid #ffe082;
    white-space: pre-wrap; /* ★ これで改行が有効になります */
    line-height: 1.6;
}
.news-item:last-child { border-bottom: none; }
.news-date { 
    display: block;
    color: #f57f17;
    font-size: 11px; 
    font-weight: bold;
    margin-bottom: 4px;
}

/* ランキング */
.ranking-section { margin-top: 40px; }
.ranking-toggle { width: 100%; max-width: 330px; background: #f8f9fa; border: 1px solid #ddd; padding: 15px; margin: 10px auto; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 18px; }
.ranking-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; width: 100%; max-width: 330px; margin: 0 auto; }
.ranking-content.open { max-height: 400px; overflow-y: auto; border: 1px solid #ddd; background: #fff; }

.admin-buttons { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 5px; }
.danger { background: #dc3545; color: white; border: none; font-size: 11px; padding: 5px 8px; border-radius: 4px; }

@media (max-width: 600px) {
    .admin-buttons { position: static; flex-direction: row; justify-content: center; margin-bottom: 15px; }
}
</style>
</head>

<body>
<div class="container">
    <h1>Stuvy</h1>

    <div id="streakDisplay" style="font-size: 24px; font-weight: bold; color: #ff4500; margin: 10px 0; font-family: 'Orbitron', sans-serif;">🌵 準備完了</div>

    <div class="admin-buttons">
        <button class="danger" onclick="confirmResetTimer()">タイマーリセット</button>
        <button class="danger" onclick="confirmResetData()">累計リセット</button>
    </div>

  <div style="background:rgba(241, 243, 245, 0.9); padding:15px; border-radius:10px; margin: 20px auto; max-width: 500px; color: #333;">
    <h3>アカウント</h3>
    
    <p style="font-size: 12px; color: #d63384; background: #fff; padding: 10px; border-radius: 5px; border: 1px solid #ffc107; text-align: left; margin-bottom: 15px;">
        <strong>【重要 / 注意事項】</strong><br>
        ・Stuvyはアカウント作成を強く推奨しています<br>
        ・アカウントを作成しないと様々な機能が制限され結果が保存されません<br>
        ・本名は使用しないようにしてください<br>
        ・背景募集中です
    </p>

    <input id="email" type="email" placeholder="メール" style="padding:8px;">
    <input id="password" type="password" placeholder="パスワード" style="padding:8px;">
        <div style="margin-top:10px;">
            <button onclick="signUp()">登録</button>
            <button onclick="signIn()">ログイン</button>
            <button onclick="signOut()">ログアウト</button>
        </div>
        <p id="currentUser" style="font-weight:bold; margin-top:10px; font-size: 14px;"></p>
        <hr>
        <div style="display:flex; justify-content:center; gap:5px;">
            <input id="newNickname" type="text" placeholder="名前変更" style="padding:8px; width:150px;">
            <button onclick="Nickname()" style="font-size:14px; padding:5px 10px;">変更</button>
        </div>
    </div>

    <p>累計時間: <span id="totalHours">0</span> h</p>
    <p id="totalHoursDetail" style="margin-top:-15px; margin-bottom:15px; color:#666; font-size:14px;"></p>
    <p>現在のランク: <span id="rank">ブロンズ I</span></p>
    <p>次のランクまで: <span id="nextRank">0</span> h</p>

    <div id="timer">00:00:00</div>
    <div style="margin: 20px 0;">
        <button onclick="addTime()">+30分</button>
        <button onclick="startTimer()" style="padding: 15px 30px; font-weight: bold; font-size: 20px; background: #0d6efd; color:white; border:none; border-radius:8px;">スタート / 一時停止</button>
    </div>

    <div class="progress-wrapper">
        <div class="progress"><div class="progress-bar" id="progressBar"></div><div class="progress-text" id="progressText">0%</div></div>
    </div>

    <div style="margin-top:40px;">
        <button onclick="changeMonth(-1)">◀ 前月</button>
        <span id="monthLabel" style="font-weight:bold; font-size:20px; margin:0 15px;">2026年3月</span>
        <button onclick="changeMonth(1)">次月 ▶</button>
    </div>
    <div id="monthTotal" style="margin:10px 0;">今月合計: 0 h</div>
    <div id="calendar"></div>

    <div class="news-section">
        <div class="news-title">📢 NEWS / お知らせ</div>
        <div id="newsContent">
            <div class="news-item">お知らせを読み込み中...</div>
        </div>
    </div>

    <div class="ranking-section">
        <h2>🏆 ランキング</h2>
        <div class="ranking-toggle" onclick="toggleRank('dailyContent')">今日のランキング ▼</div>
        <div id="dailyContent" class="ranking-content"><div id="dailyRank"></div><p id="myRankDaily" style="padding:10px; font-weight:bold; color:#0d6efd;"></p></div>
        <div class="ranking-toggle" onclick="toggleRank('weekContent')">今週のランキング ▼</div>
        <div id="weekContent" class="ranking-content"><div id="weekRank"></div><p id="myRankWeek" style="padding:10px; font-weight:bold; color:#0d6efd;"></p></div>
        <div class="ranking-toggle" onclick="toggleRank('monthContent')">今月のランキング ▼</div>
        <div id="monthContent" class="ranking-content"><div id="monthRank"></div><p id="myRankMonth" style="padding:10px; font-weight:bold; color:#0d6efd;"></p></div>
        <div class="ranking-toggle" onclick="toggleRank('totalContent')">総合ランキング ▼</div>
        <div id="totalContent" class="ranking-content"><div id="totalRank"></div><p id="myRankTotal" style="padding:10px; font-weight:bold; color:#0d6efd;"></p></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const ranks = [
    { name:"ブロンズ I", hours:0, color:"#ff9900", stroke:"#cc6600" }, { name:"ブロンズ II", hours:4, color:"#ff9900", stroke:"#cc6600" }, { name:"ブロンズ III", hours:11, color:"#ff9900", stroke:"#cc6600" },
    { name:"シルバー I", hours:20, color:"#c0c0c0", stroke:"#808080" }, { name:"シルバー II", hours:29, color:"#c0c0c0", stroke:"#808080" }, { name:"シルバー III", hours:43, color:"#c0c0c0", stroke:"#808080" },
    { name:"ゴールド I", hours:60, color:"#ffd700", stroke:"#ccaa00" }, { name:"ゴールド II", hours:78, color:"#ffd700", stroke:"#ccaa00" }, { name:"ゴールド III", hours:104, color:"#ffd700", stroke:"#ccaa00" },
    { name:"プラチナ I", hours:140, color:"#d0e0e3", stroke:"#9fb8bd" }, { name:"プラチナ II", hours:178, color:"#d0e0e3", stroke:"#9fb8bd" }, { name:"プラチナ III", hours:232, color:"#d0e0e3", stroke:"#9fb8bd" },
    { name:"ダイヤモンド I", hours:300, color:"#00ffff", stroke:"#009999" }, { name:"ダイヤモンド II", hours:372, color:"#00ffff", stroke:"#009999" }, { name:"ダイヤモンド III", hours:476, color:"#00ffff", stroke:"#009999" },
    { name:"カーボナド", hours:620, color:"#8b0000", stroke:"#550000" }, { name:"パラゴン", hours:1260, color:"#4b0082", stroke:"#2e004d" }, { name:"オムニス", hours:2540, color:"#00ff99", stroke:"#009966" }
];

let totalHours = 0, timerInterval = null, remainingSeconds = 0, currentDate = new Date();
const supabaseUrl = "https://vfgfunxzthogghymrnnq.supabase.co", supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmZ2Z1bnh6dGhvZ2doeW1ybm5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQzMDQsImV4cCI6MjA4Nzg5MDMwNH0.HA0wze4yqkq1XebULhpyDUqQkgRe4xIoHUBTB65bM-o";
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

// --- 表示更新用関数 ---
function updateDisplay() {
    const streakDisplay = document.getElementById("streakDisplay");
    const streakText = streakDisplay ? streakDisplay.innerText : "0";
    const streakNum = parseInt(streakText.replace(/[^0-9]/g, "")) || 0;
    const multiplier = getBonusMultiplier(streakNum);
    const totalWithBonus = totalHours; 
    const rawHours = totalWithBonus / multiplier;
    
    document.getElementById("totalHours").innerText = totalWithBonus.toFixed(1);
    document.getElementById("totalHoursDetail").innerText = `(実質努力: ${rawHours.toFixed(1)}h + 🎁ボーナス: ${(totalWithBonus - rawHours).toFixed(1)}h)`;
    
    let currentRank = ranks[0], nextRank = null;
    for(let i=0; i<ranks.length-1; i++){ if(totalWithBonus >= ranks[i].hours && totalWithBonus < ranks[i+1].hours){ currentRank = ranks[i]; nextRank = ranks[i+1]; break; } }
    if(totalWithBonus >= ranks[ranks.length-1].hours) currentRank = ranks[ranks.length-1];
    
    const rankEl = document.getElementById("rank"); 
    rankEl.innerText = currentRank.name; 
    rankEl.style.color = currentRank.color; 
    rankEl.style.webkitTextStroke = "0.6px " + currentRank.stroke;
    
    const bar = document.getElementById("progressBar");
    if(nextRank){
        document.getElementById("nextRank").innerText = (nextRank.hours - totalWithBonus).toFixed(1);
        let percent = ((totalWithBonus - currentRank.hours) / (nextRank.hours - currentRank.hours)) * 100;
        bar.style.width = percent + "%"; 
        bar.style.background = currentRank.color; 
        document.getElementById("progressText").innerText = Math.floor(percent) + "%";
    } else { 
        document.getElementById("nextRank").innerText = "MAX"; 
        bar.style.width = "100%"; 
        document.getElementById("progressText").innerText = "100%"; 
    }
}

function updateTimerDisplay(){
    const h=String(Math.floor(remainingSeconds/3600)).padStart(2,"0"), m=String(Math.floor((remainingSeconds%3600)/60)).padStart(2,"0"), s=String(remainingSeconds%60).padStart(2,"0");
    document.getElementById("timer").innerText=`${h}:${m}:${s}`;
}

// --- タイマー操作 ---
function addTime(){ remainingSeconds += 1800; updateTimerDisplay(); }
function startTimer(){
    if(timerInterval){ clearInterval(timerInterval); timerInterval=null; return; }
    if(remainingSeconds<=0) return;
    timerInterval = setInterval(() => {
        remainingSeconds--; updateTimerDisplay();
        if(remainingSeconds<=0){ 
            clearInterval(timerInterval); 
            timerInterval=null; 
            totalHours += 0.5; 
            saveToSupabase(); 
            updateDisplay(); 
        }
    },1000);
}

// --- Supabase連携 ---
async function fetchNews() {
    const { data: news, error } = await supabaseClient.from('news').select('*').order('created_at', { ascending: false }).limit(5);
    const container = document.getElementById('newsContent');
    const section = document.querySelector('.news-section');
    if (error || !news || news.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    container.innerHTML = news.map(item => `
        <div class="news-item">
            <span class="news-date">📅 ${new Date(item.created_at).toLocaleDateString()}</span>${item.content}
        </div>
    `).join('');
}

async function saveToSupabase() {
    const { data: { user } } = await supabaseClient.auth.getUser(); 
    if (!user) return;

    // 1. 今のrecordデータを一旦読み込んで、現在の「今日・週・月」の時間を確認する
    const { data: record } = await supabaseClient.from("record").select("*").eq("user_id", user.id).maybeSingle();

    // 2. 今の数値に「+30分」加算する（データがなければ0からスタート）
    const newDaily = (record?.daily_minutes || 0) + 30;
    const newWeekly = (record?.weekly_minutes || 0) + 30;
    const newMonthly = (record?.monthly_minutes || 0) + 30;

    // 3. Supabaseの全てのカラム（箱）を更新！
    await supabaseClient.from("record").upsert({ 
        user_id: user.id, 
        total_minutes: Math.round(totalHours * 60), // 累計（既存）
        daily_minutes: newDaily,                    // 今日（追加）
        weekly_minutes: newWeekly,                  // 今週（追加）
        monthly_minutes: newMonthly,                // 今月（追加）
        updated_at: new Date().toISOString() 
    }, { onConflict: "user_id" });

    // 4. カレンダーとランキングの表示を最新にする
    updateRanking(); 
    renderCalendar();
}
async function updateRanking(){
    const { data: { user } } = await supabaseClient.auth.getUser();

    // 表示したいランキングの「カラム名」と「HTMLのID」をセットにする
    const types = [
        { col: "daily_minutes", id: "dailyRank", my: "myRankDaily" },
        { col: "weekly_minutes", id: "weekRank", my: "myRankWeek" },
        { col: "monthly_minutes", id: "monthRank", my: "myRankMonth" },
        { col: "total_minutes", id: "totalRank", my: "myRankTotal" }
    ];

    for(let t of types) {
        try {
            // データを取得（新しいカラムも全部含めて取得する）
            const { data, error } = await supabaseClient
                .from("record")
                .select("user_id, username, total_minutes, daily_minutes, weekly_minutes, monthly_minutes")
                .order(t.col, {ascending:false})
                .limit(10);

            if(error) throw error;

            const div = document.getElementById(t.id);
            div.innerHTML = "";
            
            if(data) {
                data.forEach((r, i) => {
                    // そのランキング（今日、週、月など）に応じた時間を表示
                    const displayHours = ((r[t.col] || 0) / 60).toFixed(1);
                    div.innerHTML += `<div style="font-size:13px; padding:8px; border-bottom:1px solid #eee; text-align:left;">
                        ${i+1}位: ${r.username || '匿名'}<br>
                        <b style="color:#0d6efd;">${displayHours}h</b>
                    </div>`;
                });

                if(user) {
                    const myIdx = data.findIndex(a => a.user_id === user.id) + 1;
                    const myRankEl = document.getElementById(t.my);
                    if(myRankEl) myRankEl.innerText = `あなたの順位: ${myIdx > 0 ? myIdx : '-'}位`;
                }
            }
        } catch (e) {
            console.error(`${t.id}の更新に失敗:`, e);
        }
    }
}
async function renderCalendar() {
    const { data: { user } } = await supabaseClient.auth.getUser(); if (!user) return;
    const year = currentDate.getFullYear(), month = currentDate.getMonth();
    document.getElementById("monthLabel").innerText = `${year}年${month + 1}月`;
    const { data: logs } = await supabaseClient.from("daily_logs").select("*").eq("user_id", user.id);
    let streakCount = 0, tempDate = new Date();
    const activeDays = new Set(logs?.filter(l => l.minutes > 0).map(l => l.work_date));
    while (true) { const dStr = tempDate.toLocaleDateString('sv-SE'); if (activeDays.has(dStr)) { streakCount++; tempDate.setDate(tempDate.getDate() - 1); } else if (streakCount === 0 && dStr === new Date().toLocaleDateString('sv-SE')) { tempDate.setDate(tempDate.getDate() - 1); } else break; }
    document.getElementById("streakDisplay").innerText = streakCount > 0 ? `🔥 ${streakCount}日連続中！` : `🌵 記録を始めよう`;
    
    updateDisplay(); // ここで updateDisplay を呼ぶ

    const calendar = document.getElementById("calendar"); calendar.innerHTML = "";
    const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
    for (let i = 0; i < firstDay; i++) calendar.appendChild(document.createElement("div"));
    const thisMonthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
    const thisMonthLogs = logs?.filter(l => l.work_date.startsWith(thisMonthPrefix));
    document.getElementById("monthTotal").innerText = `今月合計: ${( (thisMonthLogs ? thisMonthLogs.reduce((sum, l) => sum + l.minutes, 0) : 0) / 60 ).toFixed(1)} h`;
    for (let d = 1; d <= daysInMonth; d++) {
        const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`, log = logs?.find(l => l.work_date === dStr), el = document.createElement("div");
        el.className = "day"; el.innerText = d;
        if (log?.minutes > 0) { const m = log.minutes; el.style.background = m >= 300 ? "#216e39" : m >= 120 ? "#30a14e" : m >= 30 ? "#40c463" : "#9be9a8"; el.style.color = m >= 120 ? "white" : "black"; }
        calendar.appendChild(el);
    }
}

// --- アカウント系 ---
async function signUp(){ const email=document.getElementById("email").value, password=document.getElementById("password").value; const { error } = await supabaseClient.auth.signUp({ email, password }); alert(error ? error.message : "登録成功！"); }
async function signIn(){ const email = document.getElementById("email").value, password = document.getElementById("password").value; const { data: { user }, error } = await supabaseClient.auth.signInWithPassword({ email, password }); if(error) alert(error.message); else init(); }
async function signOut(){ await supabaseClient.auth.signOut(); location.reload(); }
async function Nickname() { const name = document.getElementById("newNickname").value; if(!name) return; const { data: { user } } = await supabaseClient.auth.getUser(); await supabaseClient.from("record").upsert({ user_id: user.id, username: name }, { onConflict: "user_id" }); alert("名前を変更しました"); location.reload(); }

// --- その他 ---
function getBonusMultiplier(s) { return s >= 14 ? 1.2 : s >= 7 ? 1.1 : s >= 3 ? 1.05 : 1.0; }
function changeMonth(o){ currentDate.setMonth(currentDate.getMonth()+o); renderCalendar(); }
function toggleRank(id){ document.getElementById(id).classList.toggle('open'); }
function confirmResetTimer(){ if(confirm("タイマーをリセット？")){ remainingSeconds=0; updateTimerDisplay(); } }
function confirmResetData(){ if(confirm("累計をリセット？")){ totalHours=0; updateDisplay(); } }

async function init() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    fetchNews(); 
    if (user) {
        document.getElementById("currentUser").innerText = "ログイン中: " + (user.user_metadata?.nickname || user.email);
        const { data } = await supabaseClient.from("record").select("*").eq("user_id", user.id).maybeSingle();
        totalHours = (data?.total_minutes || 0) / 60; 
        renderCalendar(); 
        updateRanking();
    } else { 
        updateDisplay(); 
    }
}
init();
</script>
</body>
</html>
