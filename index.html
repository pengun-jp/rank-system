<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study Arena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body { font-family: Arial; text-align: center; background: #fff; margin: 0; padding: 0; }
.container { width: 100%; max-width: 1000px; margin: 0 auto; padding: 20px; box-sizing: border-box; position: relative; } /* position追加 */
button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: #f8f9fa; }

/* ★ 右上ステータスバーの設定 */
.status-bar {
    position: absolute;
    top: 20px;
    right: 20px;
    text-align: right;
    z-index: 100;
}

#timer { 
    font-family: 'Orbitron'; 
    font-size: 45px; /* 右上に置くので少しだけサイズ調整 */
    color: #0d6efd; 
    -webkit-text-stroke: 0.6px #004080; 
    margin: 0; 
    line-height: 1.1;
}

.total-info {
    font-size: 18px;
    color: #555;
    margin-bottom: 2px;
}

#totalHours { font-size: 28px; color: #333; -webkit-text-stroke: 0.5px #666; font-weight: bold; }

#rank { font-family: 'Bangers'; font-size: 36px; }

.progress-wrapper { width: 90%; margin: 30px auto; position: relative; }
.progress { height: 25px; background: #ddd; border-radius: 20px; position: relative; overflow: hidden; }
.progress-bar { height: 100%; width: 0%; border-radius: 20px; transition: width 0.5s ease, background 0.5s ease; box-shadow: inset 0 0 10px rgba(255,255,255,0.6); }
.progress-text { position: absolute; width: 100%; text-align: center; top: 0; line-height: 25px; font-weight: bold; }

.button-area { position: relative; margin: 40px 0; height: 120px; }
.center-buttons { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex; gap: 10px; }
.right-buttons { position: absolute; right: 2%; top: 50%; transform: translateY(-50%); display: flex; gap: 5px; }
.test-button { position: absolute; left: 2%; top: 50%; transform: translateY(-50%); background: #6c757d; color: white; border: none; }
.danger { background: #dc3545; color: white; border: none; }

#calendar { display: grid; grid-template-columns: repeat(7, 1fr); grid-gap: 5px; max-width: 350px; margin: 20px auto; }
.day { aspect-ratio: 1/1; line-height: 40px; border-radius: 5px; background: #fff; border: 1px solid #eee; font-size: 12px; }

.ranking-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
.ranking-box { width: 300px; background: #f8f9fa; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

/* スマホ用レスポンシブ設定 */
@media (max-width: 768px) {
    /* タイトルと重ならないように、右上の固定を解除する */
    .danger-zone, [style*="position: absolute; top: 20px;"] {
        position: static !important; /* 固定を解除 */
        display: flex !important;
        flex-direction: row !important; /* 横並びに */
        justify-content: center !important;
        gap: 10px;
        margin: 10px 0;
    }

    /* 左上のテストボタンもタイトルの下に持ってくる */
    button[onclick="addTestHours()"] {
        position: static !important;
        display: inline-block;
        margin: 5px auto;
    }

    #timer { font-size: 40px; }
    .ranking-box { width: 95%; }
}
/* ランキングの親容器 */
.ranking-section {
    margin-top: 40px;
}

/* 展開用ボタン（見出しをボタン化） */
.ranking-toggle {
    width: 100%;
    max-width: 330px;
    background: #f8f9fa;
    border: 1px solid #ddd;
    padding: 15px;
    margin: 10px auto;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    font-size: 18px;
}

.ranking-toggle:hover {
    background: #e9ecef;
}

/* 中身のランキングリスト（最初は隠す） */
.ranking-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease-out; /* ヌルッと開くアニメーション */
    width: 100%;
    max-width: 330px;
    margin: 0 auto;
}

/* 開いている時の状態 */
.ranking-content.open {
    max-height: 400px; /* ここで高さを固定！これ以上はスクロールになります */
    overflow-y: auto;  /* 中身がはみ出したらスクロールバーを出す設定 */
    margin: 0 auto 20px;
    border: 1px solid #ddd;
    background: #fff;
    width: 100%;
    max-width: 330px;
}
/* 矢印アイコンの向き */
.arrow {
    transition: transform 0.3s;
}
.open .arrow {
    transform: rotate(180deg);
}
</style>
</head>

<body>
<div class="container">
    <h1>Study Arena</h1>

<div id="streakDisplay" style="font-size: 24px; font-weight: bold; color: #ff4500; margin: 10px 0; font-family: 'Orbitron', sans-serif;">
    🌵 準備完了
</div>
    <div id="streakDisplay" style="font-size: 20px; font-weight: bold; color: #ff4500; margin: 10px 0;"></div>
    <div style="position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 5px;">
        <button class="danger" onclick="confirmResetTimer()" style="font-size: 12px; padding: 5px 10px;">タイマーリセット</button>
        <button class="danger" onclick="confirmResetData()" style="font-size: 12px; padding: 5px 10px;">累計リセット</button>
    </div>

    <button onclick="addTestHours()" style="position: absolute; top: 20px; left: 20px; background: #6c757d; color: white; border: none; font-size: 12px; padding: 5px 10px; border-radius: 5px;">+10h (テスト)</button>

    <div style="background:#f1f3f5; padding:15px; border-radius:10px; margin: 20px auto; max-width: 500px;">
        <h3>アカウント</h3>
        <input id="email" type="email" placeholder="メールアドレス" style="padding:8px;">
        <input id="password" type="password" placeholder="パスワード" style="padding:8px;">
        <div style="margin-top:10px;">
            <button onclick="signUp()">登録</button>
            <button onclick="signIn()">ログイン</button>
            <button onclick="signOut()">ログアウト</button>
        </div>
        <p id="authMessage" style="color:red; font-size:14px;"></p>
        <p id="currentUser" style="font-weight:bold;"></p>
        <hr>
        <input id="newNickname" type="text" placeholder="新しい名前" style="padding:8px;">
        <button onclick="updateNickname()">名前変更</button>
    </div>

    <p>累計時間: <span id="totalHours">0</span> h</p>
    <p>現在のランク: <span id="rank">ブロンズ I</span></p>
    <p>次のランクまで: <span id="nextRank">4</span> h</p>

    <div id="timer">00:00:00</div>

    <div style="margin: 20px 0;">
        <button onclick="addTime()">+30分</button>
        <button onclick="startTimer()" style="padding: 15px 30px; font-weight: bold; font-size: 20px;">スタート / 一時停止</button>
    </div>

    <div class="progress-wrapper">
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
    </div>

    <div style="margin-top:40px;">
        <button onclick="changeMonth(-1)">◀ 前月</button>
        <span id="monthLabel" style="font-weight:bold; font-size:20px; margin:0 15px;">2026年3月</span>
        <button onclick="changeMonth(1)">次月 ▶</button>
    </div>
    <div id="monthTotal" style="margin:10px 0;">今月合計: 0 h</div>
    <div id="calendar"></div>

   <div class="ranking-section">
    <h2>🏆 ランキング</h2>

    <div class="ranking-toggle" onclick="toggleRank('dailyContent')">
        今日のランキング <span class="arrow">▼</span>
    </div>
    <div id="dailyContent" class="ranking-content">
        <div class="ranking-box" style="width: 100%; margin: 0;">
            <div id="dailyRank"></div>
            <p id="myRankDaily" style="font-weight:bold;color:#0d6efd;"></p>
        </div>
    </div>

    <div class="ranking-toggle" onclick="toggleRank('weekContent')">
        今週のランキング <span class="arrow">▼</span>
    </div>
    <div id="weekContent" class="ranking-content">
        <div class="ranking-box" style="width: 100%; margin: 0;">
            <div id="weekRank"></div>
            <p id="myRankWeek" style="font-weight:bold;color:#0d6efd;"></p>
        </div>
    </div>

    <div class="ranking-toggle" onclick="toggleRank('monthContent')">
        今月のランキング <span class="arrow">▼</span>
    </div>
    <div id="monthContent" class="ranking-content">
        <div class="ranking-box" style="width: 100%; margin: 0;">
            <div id="monthRank"></div>
            <p id="myRankMonth" style="font-weight:bold;color:#0d6efd;"></p>
        </div>
    </div>

    <div class="ranking-toggle" onclick="toggleRank('totalContent')">
        総合ランキング <span class="arrow">▼</span>
    </div>
    <div id="totalContent" class="ranking-content">
        <div class="ranking-box" style="width: 100%; margin: 0;">
            <div id="totalRank"></div>
            <p id="myRankTotal" style="font-weight:bold;color:#0d6efd;"></p>
        </div>
    </div>
</div>
</div> <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// --- 基本データ ---
const ranks = [
    { name:"ブロンズ I", hours:0, color:"#ff9900", stroke:"#cc6600" },
    { name:"ブロンズ II", hours:4, color:"#ff9900", stroke:"#cc6600" },
    { name:"ブロンズ III", hours:11, color:"#ff9900", stroke:"#cc6600" },
    { name:"シルバー I", hours:20, color:"#c0c0c0", stroke:"#808080" },
    { name:"シルバー II", hours:29, color:"#c0c0c0", stroke:"#808080" },
    { name:"シルバー III", hours:43, color:"#c0c0c0", stroke:"#808080" },
    { name:"ゴールド I", hours:60, color:"#ffd700", stroke:"#ccaa00" },
    { name:"ゴールド II", hours:78, color:"#ffd700", stroke:"#ccaa00" },
    { name:"ゴールド III", hours:104, color:"#ffd700", stroke:"#ccaa00" },
    { name:"プラチナ I", hours:140, color:"#d0e0e3", stroke:"#9fb8bd" },
    { name:"プラチナ II", hours:178, color:"#d0e0e3", stroke:"#9fb8bd" },
    { name:"プラチナ III", hours:232, color:"#d0e0e3", stroke:"#9fb8bd" },
    { name:"ダイヤモンド I", hours:300, color:"#00ffff", stroke:"#009999" },
    { name:"ダイヤモンド II", hours:372, color:"#00ffff", stroke:"#009999" },
    { name:"ダイヤモンド III", hours:476, color:"#00ffff", stroke:"#009999" },
    { name:"カーボナド", hours:620, color:"#8b0000", stroke:"#550000" },
    { name:"パラゴン", hours:1260, color:"#4b0082", stroke:"#2e004d" },
    { name:"オムニス", hours:2540, color:"#00ff99", stroke:"#009966" }
];

let totalHours = 0;
let timerInterval = null;
let remainingSeconds = 0;
let liveTotalSeconds = 0;

// --- Supabase設定 ---
const supabaseUrl = "https://vfgfunxzthogghymrnnq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmZ2Z1bnh6dGhvZ2doeW1ybm5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTQzMDQsImV4cCI6MjA4Nzg5MDMwNH0.HA0wze4yqkq1XebULhpyDUqQkgRe4xIoHUBTB65bM-o";
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

// --- タイマー処理 ---
function addTime(){ remainingSeconds += 1800; updateTimerDisplay(); }
function startTimer(){
    if(timerInterval){ clearInterval(timerInterval); timerInterval=null; return; }
    if(remainingSeconds<=0) return;
    timerInterval = setInterval(() => {
        remainingSeconds--;
        updateTimerDisplay();
        if(remainingSeconds<=0){
            clearInterval(timerInterval); timerInterval=null;
            totalHours += 0.5;
            saveToSupabase(); 
            updateDisplay();
        }
    },1000);
}
function updateTimerDisplay(){
    const h=String(Math.floor(remainingSeconds/3600)).padStart(2,"0");
    const m=String(Math.floor((remainingSeconds%3600)/60)).padStart(2,"0");
    const s=String(remainingSeconds%60).padStart(2,"0");
    document.getElementById("timer").innerText=`${h}:${m}:${s}`;
}
async function addTestHours(){ 
    totalHours += 10; 
    updateDisplay(); 
    
    const { data: { user } } = await supabaseClient.auth.getUser();
    if(!user) return;

    const todayStr = new Date().toLocaleDateString('sv-SE');
    const totalMinutes = Math.round(totalHours * 60);

    // 今日のログを取得して10時間(600分)プラス
    const { data: currentLog } = await supabaseClient
        .from("daily_logs").select("minutes").eq("user_id", user.id).eq("work_date", todayStr).maybeSingle();
    const newDailyMins = (currentLog ? currentLog.minutes : 0) + 600;

    await supabaseClient.from("daily_logs").upsert({
        user_id: user.id, work_date: todayStr, minutes: newDailyMins
    }, { onConflict: "user_id,work_date" });

    // 累計も更新
    const nickname = user.user_metadata?.nickname || user.email.split('@')[0];
    await supabaseClient.from("record").upsert({
        user_id: user.id, username: String(nickname), total_minutes: totalMinutes, updated_at: new Date().toISOString()
    }, { onConflict: "user_id" });

    // 呼び出し順を整理（saveToSupabaseは呼ばない！）
    updateRanking();
    renderCalendar(); 
    alert("10時間ブースト完了！🔥");
}
function confirmResetTimer(){ if(confirm("タイマーをリセットしますか？")){ remainingSeconds=0; updateTimerDisplay(); clearInterval(timerInterval); timerInterval=null; }}
function confirmResetData(){ if(confirm("累計をリセットしますか？")){ totalHours=0; updateDisplay(); }}

function updateDisplay(){
    document.getElementById("totalHours").innerText = totalHours.toFixed(1);
    let currentRank = ranks[0];
    let nextRank = null;
    for(let i=0;i<ranks.length-1;i++){
        if(totalHours >= ranks[i].hours && totalHours < ranks[i+1].hours){
            currentRank = ranks[i]; nextRank = ranks[i+1]; break;
        }
    }
    if(totalHours >= ranks[ranks.length-1].hours) currentRank = ranks[ranks.length-1];

    const rankEl = document.getElementById("rank");
    rankEl.innerText = currentRank.name;
    rankEl.style.color = currentRank.color;
    rankEl.style.webkitTextStroke = "0.6px " + currentRank.stroke;

    const bar = document.getElementById("progressBar");
    if(nextRank){
        const remaining = nextRank.hours - totalHours;
        document.getElementById("nextRank").innerText = remaining.toFixed(1);
        let percent = ((totalHours - currentRank.hours) / (nextRank.hours - currentRank.hours)) * 100;
        bar.style.width = percent + "%";
        bar.style.background = currentRank.color;
        document.getElementById("progressText").innerText = Math.floor(percent) + "%";
    } else {
        document.getElementById("nextRank").innerText = "MAX";
        bar.style.width = "100%";
        document.getElementById("progressText").innerText = "100%";
    }
}

// --- Auth系 ---
async function signUp(){
    const email=document.getElementById("email").value;
    const password=document.getElementById("password").value;
    const { error } = await supabaseClient.auth.signUp({ email, password });
    document.getElementById("authMessage").innerText = error ? error.message : "登録成功！メールを確認するか、そのままログインをお試しください。";
}
async function signIn(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const { data: { user }, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if(error) document.getElementById("authMessage").innerText = error.message;
    else { loadUserRecord(user); showCurrentUser(); updateRanking(); }
}
async function signOut(){ await supabaseClient.auth.signOut(); location.reload(); }

async function loadUserRecord(user) {
    const { data, error } = await supabaseClient
        .from("record")
        .select("*")
        .eq("user_id", user.id)
        .maybeSingle();

    if (data) {
        // 分数を時間に変換して保持
        totalHours = data.total_minutes / 60;
    } else {
        totalHours = 0;
    }
    
    // ここで画面を最新状態にする！
    updateDisplay();
    renderCalendar();
}

async function showCurrentUser() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (user) document.getElementById("currentUser").innerText = "ログイン中: " + (user.user_metadata?.nickname || user.email);
}

async function updateNickname() {
    const name = document.getElementById("newNickname").value;
    if(!name) return;
    const { error } = await supabaseClient.auth.updateUser({ data: { nickname: name } });
    document.getElementById("nicknameMessage").innerText = error ? error.message : "変更成功！";
    showCurrentUser();
}

// --- ランキング & リセット処理 ---
function resetIfNeeded(record){
    const now = new Date();
    const lastUpdate = new Date(record.updated_at || record.created_at);

    // 今日 0:00
    const today = new Date(now); today.setHours(0,0,0,0);
    if(lastUpdate < today) record.daily_minutes = 0;

    // 月曜 0:00
    const day = now.getDay();
    const diff = now.getDate() - day + (day == 0 ? -6 : 1);
    const monday = new Date(now); monday.setDate(diff); monday.setHours(0,0,0,0);
    if(lastUpdate < monday) record.weekly_minutes = 0;

    // 今月 1日
    if(now.getMonth() !== lastUpdate.getMonth()) record.monthly_minutes = 0;

    return record;
}

async function saveToSupabase() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return;

    // 今回追加する分数（基本は30分、もしタイマーをいじれるならその値。現状は0.5h加算なので30分）
    const addedMinutes = 30; 
    const totalMinutes = Math.round(totalHours * 60);
    const todayStr = new Date().toLocaleDateString('sv-SE');

    // 日記帳(daily_logs)の更新：加算ロジック
    const { data: currentLog } = await supabaseClient
        .from("daily_logs").select("minutes").eq("user_id", user.id).eq("work_date", todayStr).maybeSingle();
    const newDailyMins = (currentLog ? currentLog.minutes : 0) + addedMinutes;

    await supabaseClient.from("daily_logs").upsert({
        user_id: user.id,
        work_date: todayStr,
        minutes: newDailyMins
    }, { onConflict: "user_id,work_date" });

    // 累計(record)の更新
    const nickname = user.user_metadata?.nickname || user.email.split('@')[0];
    await supabaseClient.from("record").upsert({
        user_id: user.id,
        username: String(nickname),
        total_minutes: totalMinutes,
        updated_at: new Date().toISOString()
    }, { onConflict: "user_id" });

    updateRanking();
    renderCalendar();
}

async function updateRanking(){
    const types = [
        { col: "daily_minutes", id: "dailyRank", my: "myRankDaily" },
        { col: "weekly_minutes", id: "weekRank", my: "myRankWeek" },
        { col: "monthly_minutes", id: "monthRank", my: "myRankMonth" },
        { col: "total_minutes", id: "totalRank", my: "myRankTotal" }
    ];

    const { data: { user } } = await supabaseClient.auth.getUser();

    for(let t of types) {
        const { data } = await supabaseClient.from("record").select("*").order(t.col, {ascending:false}).limit(100);
        const div = document.getElementById(t.id);
        div.innerHTML = "";
        data?.forEach((r, i) => {
            let m = (i===0)?"🥇 ":(i===1)?"🥈 ":(i===2)?"🥉 ":"";
            div.innerHTML += `<p style="font-size:14px; border-bottom:1px solid #eee; padding:5px;">${m}${i+1}位 ${r.username} - ${Math.floor(r[t.col]/60)}h ${r[t.col]%60}m</p>`;
        });
        
        if(user) {
            const { data: all } = await supabaseClient.from("record").select("user_id").order(t.col, {ascending:false});
            const myIdx = all?.findIndex(a => a.user_id === user.id) + 1;
            document.getElementById(t.my).innerText = `あなたの順位: ${myIdx || '-'}位`;
        }
    }
}

// カレンダー表示用
async function renderCalendar() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return;

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const monthLabel = document.getElementById("monthLabel");
    if (monthLabel) monthLabel.innerText = `${year}年${month + 1}月`;
    
    const calendar = document.getElementById("calendar");
    if (!calendar) return;
    calendar.innerHTML = "";

    // 取得範囲を広めに（ストリーク計算のため先月分も少し取るのが理想ですが、まずは今月分で計算）
    const { data: logs } = await supabaseClient.from("daily_logs").select("*").eq("user_id", user.id);

    // 今月合計の表示
    const thisMonthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
    const thisMonthLogs = logs?.filter(l => l.work_date.startsWith(thisMonthPrefix));
    const totalMins = thisMonthLogs ? thisMonthLogs.reduce((sum, l) => sum + l.minutes, 0) : 0;
    if (document.getElementById("monthTotal")) document.getElementById("monthTotal").innerText = `今月合計: ${(totalMins/60).toFixed(1)} h`;

   // --- ストリーク計算ここから ---
    let streak = 0;
    let checkDate = new Date(); // 今日から遡る
    // 記録がある日をセットにする（計算しやすくするため）
    const activeDays = new Set(logs?.filter(l => l.minutes > 0).map(l => l.work_date));

    while (true) {
        const dateStr = checkDate.toLocaleDateString('sv-SE');
        if (activeDays.has(dateStr)) {
            streak++;
            checkDate.setDate(checkDate.getDate() - 1);
        } else {
            // 「今日」まだやっていないだけなら、昨日の分からチェックを続ける（猶予）
            if (streak === 0 && dateStr === new Date().toLocaleDateString('sv-SE')) {
                checkDate.setDate(checkDate.getDate() - 1);
                continue;
            }
            break; // 途切れたら終了
        }
    }

    // 画面に反映
    const streakEl = document.getElementById("streakDisplay");
    if (streakEl) {
        streakEl.innerText = streak > 0 ? `🔥 ${streak}日連続中！` : `🌵 記録を始めよう`;
    }
    // --- ストリーク計算ここまで ---
    const streakEl = document.getElementById("streakDisplay");
    if (streakEl) streakEl.innerText = streak > 0 ? `🔥 ${streak}日連続中！` : `🌵 制作を開始しよう`;

    // カレンダー描画（既存のロジック）
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    for (let i = 0; i < firstDay; i++) calendar.appendChild(document.createElement("div"));

    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const dayLog = thisMonthLogs?.find(l => l.work_date === dateStr);
        const day = document.createElement("div");
        day.className = "day";
        day.innerText = d;
        if (dayLog && dayLog.minutes > 0) {
            const mins = dayLog.minutes;
            if (mins >= 300) { day.style.background = "#216e39"; day.style.color = "white"; }
            else if (mins >= 120) { day.style.background = "#30a14e"; day.style.color = "white"; }
            else if (mins >= 30) { day.style.background = "#40c463"; }
            else { day.style.background = "#9be9a8"; }
            day.title = `${(mins/60).toFixed(1)}h`;
        } else {
            day.style.background = "#ebedf0";
        }
        calendar.appendChild(day);
    }
}

let currentDate = new Date();
function changeMonth(offset){ currentDate.setMonth(currentDate.getMonth()+offset); renderCalendar(); }

// ランキングの開閉を制御する関数
function toggleRank(id) {
    const content = document.getElementById(id);
    // 「open」というクラスがついていれば外し、なければ付ける
    content.classList.toggle('open');
    
    // 矢印を回転させるための処理（ボタン自体のクラスも切り替える）
    const toggle = content.previousElementSibling;
    toggle.classList.toggle('open');
}
// --- 初期化処理 ---
async function init() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (user) {
        await showCurrentUser();
        await loadUserRecord(user); 
        await renderCalendar(); // ここでカレンダーと一緒にストリークも計算される！
        await updateRanking();
    } else {
        updateDisplay();
    }
}

init(); // initを実行
